<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Retro ROMs Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>
    <nav id="side-menu" class="side-menu">
        <button onclick="toggleMenu()" class="close-btn">✕</button>
        <h2>Emuladores</h2>
        <div class="wiki-section">
            <h3>PCSX2 (PS2)</h3>
            <p>O emulador definitivo para PS2.</p>
            <a href="https://pcsx2.net/" target="_blank" class="btn-wiki">Site Oficial</a>
        </div>
    </nav>

    <div id="consoles" class="section active">
        <h1 class="main-title">RETRO ROMs VAULT</h1>
        <div class="console-grid">
            <div class="console-card" onclick="showSection('ps2-games')">
                <img src="ps2.png" alt="PS2">
                <span>PlayStation 2</span>
            </div>
        </div>
    </div>

    <div id="ps2-games" class="section">
        <div class="back-nav" onclick="showSection('consoles')">← Voltar</div>
        <h2 class="title-ps2">PlayStation 2</h2>
        <div class="game-list">
            <div class="game-item">GTA San Andreas</div>
            <div class="game-item">GTA 3</div>
            <div class="game-item">Resident Evil 4</div>
            <div class="game-item">Bomba Patch</div>
        </div>
    </div>

    <script>
        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('side-menu').classList.remove('open');
        }
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
    </script>
</body>
</html>
