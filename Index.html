<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro ROMs & ISOs Vault</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <button class="btn-back">← Back</button>
        <div class="main-title">🕹️ Retro ROMs & ISOs Vault</div>
        <div style="width: 80px;"></div>
    </header>

    <main class="content">
        <section class="section-container">
            <h2 class="section-title">Consoles</h2>
            <div class="console-grid">
                <div class="console-card"><img src="banana/nes.png" alt="NES"><span>NES</span></div>
                <div class="console-card"><img src="banana/snes.png" alt="SNES"><span>SNES</span></div>
                <div class="console-card"><img src="banana/n64.png" alt="N64"><span>N64</span></div>
                <div class="console-card"><img src="banana/gamecube.png" alt="GameCube"><span>GameCube</span></div>
                <div class="console-card"><img src="banana/wii.png" alt="Wii"><span>Wii</span></div>
                <div class="console-card"><img src="banana/wiiu.png" alt="Wii U"><span>Wii U</span></div>
                <div class="console-card"><img src="banana/ds.png" alt="DS"><span>DS</span></div>
                <div class="console-card"><img src="banana/3ds.png" alt="3DS"><span>3DS</span></div>
                <div class="console-card"><img src="banana/ps1.png" alt="PS1"><span>PS1</span></div>
                <div class="console-card"><img src="banana/ps2.png" alt="PS2"><span>PS2</span></div>
                <div class="console-card"><img src="banana/ps3.png" alt="PS3"><span>PS3</span></div>
                <div class="console-card"><img src="banana/psp.png" alt="PSP"><span>PSP</span></div>
                <div class="console-card"><img src="banana/psvita.png" alt="PS Vita"><span>PS Vita</span></div>
                <div class="console-card"><img src="banana/gameboy.png" alt="GameBoy"><span>GameBoy</span></div>
                <div class="console-card"><img src="banana/dreamcast.png" alt="Dreamcast"><span>Dreamcast</span></div>
                <div class="console-card"><img src="banana/segag.png" alt="Sega G."><span>Sega G.</span></div>
            </div>
        </section>

        <section id="terminal-container" class="terminal-container hidden">
            <div class="terminal-header">💻 System Core Terminal</div>
            <div class="terminal-body" id="terminal-body">
                <div>[SYSTEM] Aguardando comandos...</div>
            </div>
        </section>
    </main>

    <script>
        // Atalho CTRL + SHIFT + C
        window.addEventListener('keydown', function(event) {
            if (event.ctrlKey && event.shiftKey && event.key === 'C') {
                event.preventDefault();
                const term = document.getElementById('terminal-container');
                term.classList.toggle('hidden');
            }
        });
    </script>
</body>
</html>
